<!DOCTYPE html>
<html>
<head>
    <title>Fake News Detector</title>
</head>
<body>
    <h2>Fake News Detection</h2>
    <form action="/predict" method="post">
        <textarea name="news" rows="5" cols="40"></textarea><br><br>
        <input type="submit" value="Check">
    </form>

    {% if prediction %}
        <h3>Result: {{ prediction }}</h3>
    {% endif %}
</body>
</html>
